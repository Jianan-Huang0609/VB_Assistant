<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VB Assistant - 登录</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px 24px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: white;
      color: #374151;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }
    .oauth-btn:hover {
      background: #f9fafb;
      border-color: #d1d5db;
    }
    .oauth-btn.google {
      color: #ea4335;
    }
    .oauth-btn.github {
      background: #24292e;
      color: white;
      border-color: #24292e;
    }
    .oauth-btn.github:hover {
      background: #1f2328;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full mx-4">
    <div class="bg-white rounded-lg shadow-lg p-8">
      <!-- Logo 和标题 -->
      <div class="text-center mb-8">
        <div class="text-3xl font-bold text-gray-900 mb-2">VB Assistant</div>
        <p class="text-gray-600">专业的VB.NET开发辅助平台</p>
      </div>

      <!-- 登录表单 -->
      <div class="space-y-6">
        <!-- 邮箱登录 -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
            邮箱地址
          </label>
          <input 
            type="email" 
            id="email" 
            placeholder="your@email.com"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          >
        </div>
        
        <button 
          id="email-login-btn"
          class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors"
        >
          发送登录链接
        </button>

        <div class="relative">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500">或使用第三方登录</span>
          </div>
        </div>

        <!-- OAuth 按钮 -->
        <div class="space-y-3">
          <a href="#" id="google-login" class="oauth-btn google">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            使用 Google 登录
          </a>
          
          <a href="#" id="github-login" class="oauth-btn github">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            使用 GitHub 登录
          </a>
        </div>

        <!-- 状态消息 -->
        <div id="status-message" class="hidden p-3 rounded-md text-sm"></div>

        <!-- 返回链接 -->
        <div class="text-center mt-6">
          <a href="index.html" class="text-blue-600 hover:text-blue-800 text-sm">
            ← 返回主页
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  
  <script>
    // 初始化 Supabase
    const supabase = window.supabase.createClient(
      'https://ebbitzscqizogrfyfklh.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViYml0enNjcWl6b2dyZnlma2xoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTY0NDAzNTMsImV4cCI6MjA3MjAxNjM1M30.f0gSCCHJ_sEFV9R6IGOcr3CYnaVrZsnIxP3VDFP_RZM'
    );

    // 状态消息显示函数
    function showMessage(message, type = 'info') {
      const statusEl = document.getElementById('status-message');
      statusEl.textContent = message;
      statusEl.className = `p-3 rounded-md text-sm ${type === 'error' ? 'bg-red-100 text-red-700' : 'bg-blue-100 text-blue-700'}`;
      statusEl.classList.remove('hidden');
    }

    // 邮箱登录
    document.getElementById('email-login-btn').addEventListener('click', async () => {
      const email = document.getElementById('email').value.trim();
      if (!email) {
        showMessage('请输入邮箱地址', 'error');
        return;
      }

      try {
        const { error } = await supabase.auth.signInWithOtp({
          email,
          options: {
            emailRedirectTo: 'https://jianan-huang0609.github.io/VB_Assistant/auth-callback.html'
          }
        });

        if (error) throw error;
        
        showMessage('登录链接已发送到您的邮箱，请查收并点击链接完成登录');
      } catch (error) {
        console.error('邮箱登录失败:', error);
        showMessage('登录失败: ' + error.message, 'error');
      }
    });

    // Google OAuth 登录
    document.getElementById('google-login').addEventListener('click', async (e) => {
      e.preventDefault();
      
      try {
        const { error } = await supabase.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: 'https://jianan-huang0609.github.io/VB_Assistant/auth-callback.html'
          }
        });

        if (error) throw error;
        
        showMessage('正在跳转到 Google 登录...');
      } catch (error) {
        console.error('Google 登录失败:', error);
        showMessage('Google 登录失败: ' + error.message, 'error');
      }
    });

    // GitHub OAuth 登录
    document.getElementById('github-login').addEventListener('click', async (e) => {
      e.preventDefault();
      
      try {
        const { error } = await supabase.auth.signInWithOAuth({
          provider: 'github',
          options: {
            redirectTo: 'https://jianan-huang0609.github.io/VB_Assistant/auth-callback.html'
          }
        });

        if (error) throw error;
        
        showMessage('正在跳转到 GitHub 登录...');
      } catch (error) {
        console.error('GitHub 登录失败:', error);
        showMessage('GitHub 登录失败: ' + error.message, 'error');
      }
    });

    // 检查是否已经登录
    window.addEventListener('load', async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) {
        // 如果已经登录，跳转到主页
        window.location.href = 'index.html';
      }
    });
  </script>
</body>
</html>
